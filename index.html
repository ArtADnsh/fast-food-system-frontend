<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلتفرم سفارش فست‌فود</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar (Glass Effect) -->
    <nav class="navbar navbar-expand-lg fixed-top glass-effect glass-nav">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="#home">فست‌فود آنلاین</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#home">خانه</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark" href="#orders">سفارشات من</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="#cart" class="btn btn-warning rounded-pill me-2 px-4 shadow-sm cart-hover-effect">
                        سبد خرید <span class="badge bg-danger ms-1" id="cart-count">0</span>
                    </a>
                    <div id="auth-buttons">
                        <a href="#login" class="btn glass-btn rounded-pill px-4">ورود</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content (Dynamic Injection) -->
    <main id="app" class="container app-container"></main>

    <!-- Footer (Glass Effect) -->
    <footer class="glass-effect text-center p-3 mt-5 text-dark">
        <div class="container">
            <p class="mb-0">تمامی حقوق برای پلتفرم سفارش فست‌فود محفوظ است. © 2026</p>
        </div>
    </footer>

    <!-- Bootstrap JS & App Logic -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>

    <div id="toast-container" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center;"></div>
</body>
</html>

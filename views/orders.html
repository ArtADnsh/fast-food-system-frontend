<div class="container py-4">
    <h2 class="fw-bold mb-4 text-white-shadow">تاریخچه سفارشات من</h2>
    
    <div id="orders-container"></div>
</div>

<div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card border-0 shadow-lg" style="backdrop-filter: blur(15px);">
            <div class="modal-header border-secondary border-opacity-25">
                <h5 class="modal-title fw-bold text-dark" id="invoiceModalTitle">فاکتور سفارش</h5>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-borderless align-middle text-dark">
                        <thead>
                            <tr class="border-bottom border-secondary border-opacity-25">
                                <th>نام محصول</th>
                                <th class="text-center">تعداد</th>
                                <th class="text-end">قیمت واحد</th>
                            </tr>
                        </thead>
                        <tbody id="invoice-items-body">
                            </tbody>
                    </table>
                </div>
                <hr class="border-secondary border-opacity-25">
                <div class="d-flex justify-content-between align-items-center mt-3">
                    <span class="text-dark fw-bold">جمع کل پرداختی:</span>
                    <span class="text-success fw-bold fs-5" id="invoiceTotalAmount">0</span>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">بستن</button>
            </div>
        </div>
    </div>
</div>

<!-- هدر اطلاعات رستوران با افکت شیشه‌ای -->
<div id="restaurant-info" class="text-center py-5 mb-4 text-white-shadow glass-effect rounded-4 mt-3">
    <!-- این بخش تا زمان دریافت دیتا، لودینگ نشان می‌دهد -->
    <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">در حال بارگذاری...</span>
    </div>
</div>

<!-- بخش دسته‌بندی منوها (فیلترها) -->
<div id="categories-container" class="d-flex justify-content-center gap-2 mb-4 flex-wrap">
    <!-- دکمه‌های دسته‌بندی اینجا با جاوا اسکریپت اضافه می‌شوند -->
</div>

<!-- گرید نمایش آیتم‌های منو -->
<div id="menu-items-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 pb-5">
    <!-- کارت‌های غذا اینجا لود می‌شوند -->
</div>

<div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card border-0 shadow-lg">
            <div class="modal-header border-secondary border-opacity-25">
                <h5 class="modal-title fw-bold text-dark">اطلاعات رستوران</h5>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-dark p-0" id="restaurant-info-body"></div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">بستن</button>
            </div>
        </div>
    </div>
</div>

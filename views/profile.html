<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <h2 class="fw-bold text-white-shadow mb-4 text-center">تنظیمات پروفایل</h2>
            
            <div class="glass-card p-4 p-md-5 shadow-lg">
                <form onsubmit="event.preventDefault(); alert('تغییرات با موفقیت ذخیره شد!');">
                    
                    <div class="mb-4">
                        <label class="form-label text-dark fw-bold">نام و نام خانوادگی</label>
                        <input type="text" class="form-control glass-effect text-dark px-3 py-2 border-secondary" value="آرتا" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-dark fw-bold">شماره موبایل</label>
                        <!-- فیلد شماره موبایل معمولاً غیرقابل ویرایش است -->
                        <input type="text" class="form-control glass-effect text-muted px-3 py-2 border-secondary bg-light" value="09123456789" disabled>
                        <div class="form-text text-dark opacity-75 small mt-1">شماره موبایل جهت احراز هویت قابل تغییر نمی‌باشد.</div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-dark fw-bold">ایمیل (اختیاری)</label>
                        <input type="email" class="form-control glass-effect text-dark px-3 py-2 border-secondary" placeholder="arta@example.com">
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-dark fw-bold">آدرس پیش‌فرض</label>
                        <textarea class="form-control glass-effect text-dark px-3 py-2 border-secondary" rows="2" placeholder="آدرس کامل خود را وارد کنید..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-warning w-100 rounded-pill py-2 mt-2 fw-bold shadow cart-hover-effect">
                        ذخیره تغییرات
                    </button>
                    
                </form>
            </div>
            
        </div>
    </div>
</div>

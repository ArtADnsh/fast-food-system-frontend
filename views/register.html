<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4">
        <div class="glass-card p-5 text-center shadow-lg mt-4">
            
            <h2 class="fw-bold mb-4 text-dark">ثبت‌نام در پلتفرم</h2>
            
            <form onsubmit="registerUser(event)">
                
                <div class="mb-3 text-start">
                    <label class="form-label text-dark fw-bold">نام و نام خانوادگی</label>
                    <input type="text" class="form-control glass-effect border-secondary text-dark px-3 py-2" required placeholder="مثال: علی رضایی">
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label text-dark fw-bold">شماره موبایل</label>
                    <input type="text" class="form-control glass-effect border-secondary text-dark px-3 py-2" required placeholder="مثال: 09123456789">
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label text-dark fw-bold">ایمیل (اختیاری)</label>
                    <input type="email" class="form-control glass-effect border-secondary text-dark px-3 py-2" placeholder="ali@example.com">
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label text-dark fw-bold">رمز عبور</label>
                    <input type="password" class="form-control glass-effect border-secondary text-dark px-3 py-2" required placeholder="***">
                </div>
                
                <button type="submit" class="btn btn-success w-100 rounded-pill py-2 mt-2 fw-bold shadow glass-btn" style="background-color: rgba(25, 135, 84, 0.8); color: white;">
                    تکمیل ثبت‌نام
                </button>
                
            </form>

            <hr class="border-secondary my-4">
            
            <p class="text-dark small mb-0">
                قبلاً ثبت‌نام کرده‌اید؟ 
                <a href="#login" class="text-primary fw-bold text-decoration-none">وارد شوید</a>
            </p>
        </div>
    </div>
</div>

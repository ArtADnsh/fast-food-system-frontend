<div class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">پنل مدیریت رستوران 👨‍🍳</h2>
            <p class="text-muted small mb-0">مدیریت منو و غذاها</p>
        </div>
        <button onclick="openAddFoodModal()" class="btn btn-warning rounded-pill px-4 fw-bold shadow-sm glass-btn">
            + افزودن غذای جدید
        </button>
    </div>

    <div class="glass-card p-4 shadow-sm border-0 mb-5">
        <div class="table-responsive">
            <table class="table table-hover align-middle bg-transparent mb-0">
                <thead class="border-secondary border-opacity-25 text-dark">
                    <tr>
                        <th scope="col">نام غذا</th>
                        <th scope="col">دسته‌بندی</th>
                        <th scope="col">قیمت (تومان)</th>
                        <th scope="col" class="text-center">عملیات</th>
                    </tr>
                </thead>
                <tbody id="admin-menu-body">
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted">در حال بارگذاری اطلاعات...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>


    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mt-5 mb-4 border-top border-secondary border-opacity-25 pt-4">
        <div>
            <h3 class="fw-bold text-dark mb-1">📦 مدیریت سفارشات جاری</h3>
            <p class="text-muted small mb-0">تغییر وضعیت آماده‌سازی، ارسال و انتساب پیک</p>
        </div>
    </div>

    <div class="glass-card p-4 shadow-sm border-0 mb-5">
        <div id="admin-orders-container" class="table-responsive">
            <p class="text-center text-muted py-4 mb-0">در حال بارگذاری سفارشات...</p>
        </div>
    </div>

</div>


<div class="modal fade" id="foodModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card border-0 shadow-lg" style="backdrop-filter: blur(15px);">
            <div class="modal-header border-secondary border-opacity-25">
                <h5 class="modal-title fw-bold text-dark" id="foodModalTitle">افزودن غذای جدید 🍔</h5>
                <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body text-dark">
                <form id="foodForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">نام غذا *</label>
                        <input type="text" class="form-control bg-transparent border-secondary text-dark" id="food-name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">دسته‌بندی *</label>
                        <input type="text" class="form-control bg-transparent border-secondary text-dark" id="food-category" placeholder="مثال: پیتزا، برگر..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">قیمت (تومان) *</label>
                        <input type="number" class="form-control bg-transparent border-secondary text-dark" id="food-price" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">توضیحات ترکیبات (اختیاری)</label>
                        <textarea class="form-control bg-transparent border-secondary text-dark" id="food-description" rows="2"></textarea>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">انصراف</button>
                <button type="button" class="btn btn-warning rounded-pill px-4 fw-bold shadow-sm" onclick="saveFood()">💾 ذخیره غذا</button>
            </div>
        </div>
    </div>
</div>
